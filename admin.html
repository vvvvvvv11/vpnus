<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказы — VPN Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0c14;
  --surface: #13131f;
  --surface2: #1a1a2b;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.13);
  --accent: #6c5dd3;
  --accent-light: #8b7de8;
  --accent-bg: rgba(108,93,211,0.12);
  --text: #f0eeff;
  --muted: rgba(240,238,255,0.45);
  --success: #2ecc71;
  --success-bg: rgba(46,204,113,0.1);
  --warn: #f39c12;
  --warn-bg: rgba(243,156,18,0.1);
  --danger: #e74c3c;
  --danger-bg: rgba(231,76,60,0.1);
  --radius: 14px;
  --radius-sm: 9px;
}

body {
  font-family: 'Onest', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 20px 60px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 900px;
  margin: 0 auto 28px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo-box {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.logo-box svg { width: 20px; height: 20px; }
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar p { font-size: 13px; color: var(--muted); margin-top: 1px; }

.badge {
  display: inline-flex; align-items: center;
  font-size: 12px; font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  gap: 5px;
}
.badge-pending { background: var(--warn-bg); color: var(--warn); }
.badge-approved { background: var(--success-bg); color: var(--success); }
.badge-rejected { background: var(--danger-bg); color: var(--danger); }

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 900px;
  margin: 0 auto 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.stat-val { font-size: 22px; font-weight: 600; }

.orders-list { max-width: 900px; margin: 0 auto; display: grid; gap: 12px; }

.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: border-color .15s;
}
.order-card:hover { border-color: var(--border-hover); }
.order-card.approved { border-color: rgba(46,204,113,0.25); }
.order-card.rejected { opacity: .6; }

.order-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.order-id { font-size: 13px; color: var(--muted); }
.order-date { font-size: 13px; color: var(--muted); }

.order-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 500px) { .order-body { grid-template-columns: 1fr; } }

.order-field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.order-field-val { font-size: 14px; font-weight: 500; }

.thumb-wrap { margin-bottom: 16px; }
.thumb {
  width: 120px; height: 80px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  display: block;
}

.link-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 16px;
}
.link-text {
  font-size: 12px;
  color: var(--accent-light);
  word-break: break-all;
  flex: 1;
}
.link-copy {
  background: var(--accent-bg);
  border: none;
  border-radius: 6px;
  color: var(--accent-light);
  font-family: 'Onest', sans-serif;
  font-size: 12px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.link-copy:hover { background: rgba(108,93,211,0.2); }

.order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font-family: 'Onest', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-approve { background: var(--success-bg); color: var(--success); border: 1px solid rgba(46,204,113,0.2); }
.btn-reject { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(231,76,60,0.2); }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}

.refresh-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-family: 'Onest', sans-serif;
  font-size: 13px;
  padding: 7px 14px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border-hover); }

.sub-url { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-box">
      <svg viewBox="0 0 22 22" fill="none">
        <rect x="3" y="10" width="16" height="10" rx="3" fill="white" opacity=".9"/>
        <path d="M7 10V7a4 4 0 0 1 8 0v3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>Заказы</h1>
      <p>VPN Pro · Admin</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadOrders()">↻ Обновить</button>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Всего заказов</div>
    <div class="stat-val" id="statTotal">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Ожидают</div>
    <div class="stat-val" id="statPending" style="color: var(--warn);">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Подтверждено</div>
    <div class="stat-val" id="statApproved" style="color: var(--success);">—</div>
  </div>
</div>

<div class="orders-list" id="orders"></div>

<!-- Скрытая ссылка подписки (подставляется из PHP через отдельный запрос или хардкод) -->
<span class="sub-url" id="subUrl">https://gist.githubusercontent.com/vvvvvvv11/4398d3e9c0fecb3fc7f81d13f5e48044/raw/f2c5f12b4a877b98eeb96cf0fcfe817140914462/gistfile1.txt</span>

<script>
const SUB_URL = document.getElementById('subUrl').textContent.trim();

const OS_LABEL = { ios: '🍎 iOS (Happ)', android: '🤖 Android (v2rayNG)' };
const STATUS_LABEL = { pending: 'Ожидает', approved: 'Подтверждён', rejected: 'Отклонён' };

async function loadOrders() {
  const res = await fetch('get_orders.php');
  const orders = await res.json();

  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
  document.getElementById('statApproved').textContent = orders.filter(o => o.status === 'approved').length;

  const cont = document.getElementById('orders');
  if (!orders.length) {
    cont.innerHTML = '<div class="empty">Заказов пока нет</div>';
    return;
  }

  cont.innerHTML = orders.map(o => {
    const actions = o.status === 'pending' ? `
      <div class="order-actions">
        <button class="btn btn-approve" onclick="updateStatus('${o.id}', 'approved')">✓ Подтвердить</button>
        <button class="btn btn-reject" onclick="updateStatus('${o.id}', 'rejected')">✕ Отклонить</button>
      </div>` : '';

    const badgeClass = o.status === 'pending' ? 'badge-pending' : o.status === 'approved' ? 'badge-approved' : 'badge-rejected';

    return `
      <div class="order-card ${o.status}" id="card_${o.id}">
        <div class="order-top">
          <div>
            <span class="badge ${badgeClass}">${STATUS_LABEL[o.status] || o.status}</span>
          </div>
          <span class="order-date">${o.date}</span>
        </div>

        <div class="order-body">
          <div>
            <div class="order-field-label">Telegram ID</div>
            <div class="order-field-val">${escHtml(o.telegram)}</div>
          </div>
          <div>
            <div class="order-field-label">Тариф</div>
            <div class="order-field-val">${escHtml(o.plan)} · ${o.price} ₽</div>
          </div>
          <div>
            <div class="order-field-label">Устройство</div>
            <div class="order-field-val">${OS_LABEL[o.os] || o.os}</div>
          </div>
          <div>
            <div class="order-field-label">Дней</div>
            <div class="order-field-val">${o.days}</div>
          </div>
        </div>

        <div class="thumb-wrap">
          <div class="order-field-label" style="margin-bottom:8px;">Скриншот</div>
          <img class="thumb" src="uploads/${escHtml(o.screenshot)}" alt="Скриншот" onclick="window.open(this.src)">
        </div>

        <div class="link-row">
          <span class="link-text" id="link_${o.id}">${SUB_URL}</span>
          <button class="link-copy" onclick="copyLink('link_${o.id}', this)">Копировать</button>
        </div>

        ${actions}
      </div>
    `;
  }).join('');
}

async function updateStatus(id, status) {
  const res = await fetch('update_order.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, status })
  });
  const data = await res.json();
  if (data.success) loadOrders();
}

function copyLink(elId, btn) {
  const text = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Скопировано';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

function escHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

loadOrders();
setInterval(loadOrders, 8000);
</script>
</body>
</html>
